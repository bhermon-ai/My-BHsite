<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יהלומים נוצצים מדם - תקציר</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f4; 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }
        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
        }
        img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            margin-bottom: 25px; 
        }
        h1 { color: #2c3e50; margin-bottom: 15px; }
        p { 
            font-size: 1.2em; 
            line-height: 1.8; 
            max-width: 650px; 
            text-align: justify; 
            margin-bottom: 30px;
        }
        .back-btn { 
            text-decoration: none; 
            color: #3498db; 
            font-weight: bold; 
            border: 2px solid #3498db; 
            padding: 12px 25px; 
            border-radius: 30px; 
            transition: 0.3s; 
        }
        .back-btn:hover { 
            background: #3498db; 
            color: white; 
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="diamonds in blood.png" alt="יהלומים נוצצים מדם">
        
        <h1>יהלומים נוצצים מדם</h1>
        <p>
            סאגה משפחתית רחבת יריעה המשתרעת על פני שלושה דורות. במרכז העלילה עומד אוצר נאצי אבוד שצף ועולה מן העבר ומאיים לטלטל את חייהם של הגיבורים בהווה. סיפור על חמדנות, סודות משפחתיים אפלים והקשר הבלתי ניתן לניתוק בין גורל אישי להיסטוריה עקובה מדם.
        </p>
        
        <a href="books.html" class="back-btn">חזרה לגלריה</a>
    </div>

</body>
</html>
